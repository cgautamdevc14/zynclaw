name: Smoke

on:
  push:
  pull_request:

jobs:
  scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Compile Python scripts
        run: python -m py_compile scripts/*.py
      - name: Parse shell scripts
        run: bash -n scripts/*.sh
      - name: Check repository structure
        run: make repo-check
      - name: Probe CLI help
        run: python scripts/endpoint_probe.py --help
      - name: Check Makefile targets
        run: make lint
