name: Sales enablement
description: Request sales talk tracks, discovery, demo, or objection support.
title: "[sales] "
labels: ["sales"]
body:
  - type: input
    id: objective
    attributes:
      label: Objective
      description: What should sales be able to do?
    validations:
      required: true
  - type: textarea
    id: buyer
    attributes:
      label: Buyer or ICP
      description: Who is the target buyer or user?
    validations:
      required: true
  - type: textarea
    id: talk_track
    attributes:
      label: Talk track
      description: What should the seller emphasize?
  - type: textarea
    id: objections
    attributes:
      label: Known objections
      description: What objections should be handled?
  - type: textarea
    id: deliverables
    attributes:
      label: Deliverables
      description: What assets are needed?
      placeholder: "- "
    validations:
      required: true
