services:
  vllm-qwen36:
    image: vllm-qwen36:26.06-py3-patched
    container_name: vllm-qwen36
    restart: unless-stopped
    network_mode: host
    ipc: host
    environment:
      HF_HOME: /models/huggingface
      VLLM_ATTENTION_BACKEND: FLASH_ATTN
    volumes:
      - ${HOME}/.cache/huggingface:/models/huggingface
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 20m
    command:
      - python3
      - -m
      - vllm.entrypoints.openai.api_server
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - ${VLLM_MODEL:-Qwen/Qwen3.6-27B-FP8}
      - --served-model-name
      - Qwen3.6-27B
      - --api-key
      - ${VLLM_API_KEY:-local-vllm-key}
      - --max-model-len
      - ${VLLM_MAX_MODEL_LEN:-262144}
      - --gpu-memory-utilization
      - ${VLLM_GPU_MEMORY_UTILIZATION:-0.92}
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_xml
      - --reasoning-parser
      - qwen3
      - --num-speculative-tokens
      - ${VLLM_NUM_SPECULATIVE_TOKENS:-2}
