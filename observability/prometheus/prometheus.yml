global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - observability/prometheus/rules/local_inference_alerts.yml

scrape_configs:
  - job_name: litellm
    metrics_path: /metrics
    static_configs:
      - targets:
          - localhost:4000

  - job_name: vllm
    metrics_path: /metrics
    static_configs:
      - targets:
          - localhost:8000
